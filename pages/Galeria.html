            <div class="galeria-grid" id="galeriaGrid">
                <!-- Las fotos se generarán con JavaScript -->
            </div>
        </section>

        <!-- ============ FOOTER ============ -->

            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
